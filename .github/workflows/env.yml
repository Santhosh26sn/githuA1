name: env
on: [workflow_dispatch]
env:
  Cloud_pro: This is global env
jobs:
  Job1:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      cloud_job: This is job level env
    steps:
      - name: Log ref
        run: echo $GITHUB_REF
      - name: Log context
        run: echo '${{ github.ref}}'
      - name: log env
        env:
          cloud_step: This is step level env
          Cloud_pro: this is no more global env
        run: |
          echo '${{env.cloud_step}}'
          echo $cloud_job
          echo $Cloud_pro
