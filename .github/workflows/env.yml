name: env
on: [push]
env:
  Cloud_pro: This is global env
jobs:
  Job1:
    runs-on: ubuntu-latest
    env:
      cloud_job: This is job level env
    steps:
      - name: Log ref
        run: echo $GITHUB_REF
      - name: Log context
        run: echo '${{ github.ref}}'
      - name: env date
        run: |
          echo "field_env=$(date)" >> "$GITHUB_ENV"
          echo "cloud_job"=$RANDOM >> "$GITHUB_ENV"
      - name: log env
        env:
          cloud_step: This is step level env
          Cloud_pro: this is no more global
        run: |
          echo '${{env.cloud_step}}'
          echo $cloud_job
          echo $Cloud_pro
          echo $field_env          
          echo $cloud_job
