name: cache
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: API script
        uses: actions/github-script@v6
        with:
          script: |
           const res = await fetch('https://icanhazdadjoke.com/', { headers: { 'Accept': 'text/plain' }});
           const data = await res.text();
           console.log(data);