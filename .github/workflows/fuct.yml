name: Functions
on: [workflow_dispatch]
jobs:
  Job1:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Sleep
        run: sleep 70
#        timeout-minutes: 1
      - name: step2
        id: fail
        continue-on-error: true
        run: exit 1
      - name: failure
        if: failure() && steps.fail.conclusion == 'failure'
        run: echo "step 2 failed"
      - name: failure
        if: failure()  
        run: echo "This job runs on failure"
      - name: always run
        if: always()
        run: echo "This will always run"
      - name: cancelled
        if: cancelled()
        run: echo "This will run if the workflow is cancelled"
      - name: success
        if: success()
        run: echo "This will run if all previous steps were successful"
  Job2:
    runs-on: ubuntu-latest
    needs: Job1
    if: failure()
    steps:
      - name: This will run if Job1 fails
        run: echo "Job1 failed, so this job is running"      